<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Lescano's — Pedidos</title>
  <script src="menu.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#C9A84C;--dark:#111111;--dark2:#1C1C1C;
      --gray:#888888;--border:rgba(201,168,76,.18);
    }
    html,body{width:100%;height:100%;overflow:hidden;
      background:var(--dark);font-family:'Lato',sans-serif;
      -webkit-tap-highlight-color:transparent;color:#fff;}

    /* ── APP ── */
    #app{position:fixed;inset:0;display:flex;flex-direction:column;}
    .screen{display:none;flex-direction:column;height:100%;}
    .screen.active{display:flex;}

    /* ── HEADER ── */
    .hdr{
      background:var(--dark2);border-bottom:1px solid var(--border);
      padding:13px 16px;display:flex;align-items:center;gap:10px;
      flex-shrink:0;min-height:52px;
    }
    .hdr-brand{
      font-family:'Playfair Display',serif;font-size:1.05rem;
      font-weight:900;color:var(--gold);letter-spacing:.06em;
    }
    .hdr-sub{font-size:.6rem;color:var(--gray);letter-spacing:.14em;margin-left:3px;}
    .hdr-mesa{flex:1;font-size:.95rem;font-weight:700;color:var(--gold);}
    .back-btn{
      background:transparent;border:none;color:var(--gold);
      font-size:1.5rem;cursor:pointer;padding:2px 8px 2px 0;line-height:1;
    }
    .cart-pill{
      background:var(--gold);color:var(--dark);font-size:.7rem;font-weight:700;
      min-width:26px;height:26px;border-radius:13px;
      display:flex;align-items:center;justify-content:center;padding:0 7px;
    }

    /* ── SCREEN: MESAS ── */
    .mesa-heading{
      padding:14px 16px 6px;font-size:.65rem;color:var(--gray);
      letter-spacing:.18em;text-transform:uppercase;flex-shrink:0;
    }
    .mesa-grid{
      flex:1;overflow-y:auto;display:grid;
      grid-template-columns:repeat(3,1fr);gap:10px;
      padding:6px 16px 20px;align-content:start;
    }
    .mesa-btn{
      background:var(--dark2);border:2px solid var(--border);
      border-radius:12px;padding:18px 8px;text-align:center;cursor:pointer;
      transition:border-color .15s,background .15s;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:5px;min-height:78px;
    }
    .mesa-btn:active{background:#222;border-color:rgba(201,168,76,.5);}
    .mesa-btn.has-session{border-color:rgba(201,168,76,.7);background:rgba(201,168,76,.07);}
    .mesa-btn.llevar{
      grid-column:span 3;flex-direction:row;gap:10px;padding:15px;
    }
    .mesa-num{
      font-family:'Playfair Display',serif;font-size:1.35rem;
      font-weight:900;color:var(--gold);
    }
    .mesa-lbl{font-size:.58rem;color:var(--gray);letter-spacing:.12em;text-transform:uppercase;}
    .mesa-session-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.8;}
    .llevar-lbl{font-size:.95rem;font-weight:700;color:var(--gold);letter-spacing:.04em;}

    /* ── SCREEN: MENU ── */
    .page-tabs{
      display:flex;overflow-x:auto;border-bottom:1px solid var(--border);
      flex-shrink:0;-webkit-overflow-scrolling:touch;
    }
    .page-tabs::-webkit-scrollbar{display:none;}
    .p-tab{
      padding:11px 15px;flex-shrink:0;font-size:.72rem;font-weight:700;
      color:var(--gray);letter-spacing:.04em;cursor:pointer;
      border-bottom:2px solid transparent;margin-bottom:-1px;
      white-space:nowrap;transition:color .15s;
    }
    .p-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
    .menu-scroll{flex:1;overflow-y:auto;padding-bottom:76px;-webkit-overflow-scrolling:touch;}
    .sec-hdr{
      background:rgba(201,168,76,.07);border-bottom:1px solid var(--border);
      padding:8px 16px;display:flex;align-items:center;gap:8px;
      position:sticky;top:0;z-index:2;backdrop-filter:blur(6px);
    }
    .sec-title{font-size:.75rem;font-weight:700;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;}
    .sec-nota{font-size:.62rem;color:var(--gray);margin-left:auto;font-style:italic;}
    .m-item{
      display:flex;align-items:center;padding:12px 16px;
      border-bottom:.5px solid rgba(255,255,255,.05);gap:12px;
    }
    .m-info{flex:1;min-width:0;}
    .m-nombre{font-size:.9rem;font-weight:700;color:#fff;line-height:1.2;}
    .m-desc{font-size:.68rem;color:var(--gray);font-style:italic;margin-top:2px;line-height:1.3;}
    .m-precio{
      font-family:'Playfair Display',serif;font-size:.8rem;
      color:var(--gold);white-space:nowrap;flex-shrink:0;
    }
    .qty-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .q-btn{
      width:36px;height:36px;border:1.5px solid rgba(201,168,76,.35);
      border-radius:50%;background:transparent;color:var(--gold);
      font-size:1.25rem;display:flex;align-items:center;justify-content:center;
      cursor:pointer;line-height:1;transition:background .1s;flex-shrink:0;
    }
    .q-btn:active{background:rgba(201,168,76,.15);}
    .q-num{font-size:.9rem;font-weight:700;color:#fff;min-width:18px;text-align:center;}
    .menu-ftr{
      position:fixed;bottom:0;left:0;right:0;
      padding:10px 16px 18px;
      background:linear-gradient(to top,var(--dark) 65%,transparent);
    }
    .btn-ver{
      width:100%;padding:14px;background:var(--gold);color:var(--dark);
      font-weight:700;font-size:.95rem;border:none;border-radius:10px;
      cursor:pointer;letter-spacing:.04em;transition:opacity .15s;
    }
    .btn-ver:disabled{background:rgba(201,168,76,.22);color:rgba(0,0,0,.35);cursor:default;}
    .btn-ver:not(:disabled):active{opacity:.82;}

    /* ── SCREEN: RESUMEN ── */
    .resumen-scroll{flex:1;overflow-y:auto;padding-bottom:150px;-webkit-overflow-scrolling:touch;}
    .r-section-label{
      padding:10px 16px 4px;font-size:.55rem;color:var(--gray);
      letter-spacing:.18em;text-transform:uppercase;
    }
    .r-item{
      display:flex;align-items:center;padding:13px 16px;
      border-bottom:.5px solid rgba(255,255,255,.05);gap:12px;
    }
    .r-item.r-sent{opacity:.45;}
    .r-qty{
      background:var(--gold);color:var(--dark);font-size:.75rem;font-weight:700;
      border-radius:6px;padding:3px 8px;flex-shrink:0;
    }
    .r-item.r-sent .r-qty{background:rgba(201,168,76,.4);color:rgba(0,0,0,.5);}
    .r-nombre{flex:1;font-size:.9rem;color:#fff;font-weight:500;}
    .r-precio{font-family:'Playfair Display',serif;font-size:.82rem;color:var(--gold);}
    .r-total{
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 16px;border-top:1px solid rgba(201,168,76,.22);
    }
    .r-total-lbl{font-size:.85rem;color:var(--gray);font-weight:700;}
    .r-total-val{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold);}
    .resumen-ftr{
      position:fixed;bottom:0;left:0;right:0;
      padding:10px 16px 18px;
      background:linear-gradient(to top,var(--dark) 65%,transparent);
    }
    .btn-enviar{
      width:100%;padding:14px;background:#2a6f2a;color:#fff;
      font-weight:700;font-size:.95rem;border:none;border-radius:10px;
      cursor:pointer;letter-spacing:.04em;transition:opacity .15s;
    }
    .btn-enviar:disabled{opacity:.45;cursor:default;}
    .btn-enviar:not(:disabled):active{opacity:.82;}
    .btn-cerrar{
      width:100%;margin-top:8px;padding:11px;background:transparent;
      color:rgba(255,80,80,.7);border:1.5px solid rgba(255,80,80,.3);
      border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;
      letter-spacing:.04em;
    }
    .btn-cerrar:active{background:rgba(255,80,80,.08);}
    .fallback{margin-top:9px;display:none;}
    .fallback textarea{
      width:100%;height:72px;background:var(--dark2);
      border:1px solid var(--border);color:#bbb;font-size:.78rem;
      padding:8px 10px;border-radius:8px;resize:none;font-family:monospace;
    }
    .btn-copiar{
      width:100%;margin-top:6px;padding:11px;background:transparent;
      color:var(--gold);border:1.5px solid var(--gold);border-radius:8px;
      font-weight:700;font-size:.85rem;cursor:pointer;letter-spacing:.04em;
    }
    .btn-copiar:active{background:rgba(201,168,76,.1);}
    .r-empty{padding:40px 20px;text-align:center;color:var(--gray);font-size:.85rem;line-height:1.6;}

    /* ── VARIANT PICKER ── */
    .vp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:flex-end;}
    .vp-overlay.show{display:flex;}
    .vp-sheet{width:100%;background:#1C1C1C;border-radius:18px 18px 0 0;border-top:1px solid rgba(201,168,76,.25);padding:8px 0 32px;}
    .vp-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 14px;}
    .vp-item-name{font-size:.9rem;font-weight:700;color:#fff;padding:0 20px 4px;text-align:center;}
    .vp-title{font-size:.6rem;color:var(--gray);letter-spacing:.14em;text-align:center;padding:0 20px 10px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px;}
    .vp-options{padding:4px 12px;}
    .vp-option{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;margin:5px 0;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.12);}
    .vp-col-name{flex:1;font-size:.9rem;font-weight:700;color:#fff;}
    .vp-col-price{font-family:'Playfair Display',serif;font-size:.82rem;color:var(--gold);white-space:nowrap;min-width:52px;text-align:right;}
    .vp-qty-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .vp-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(201,168,76,.45);background:transparent;color:var(--gold);font-size:1.25rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;line-height:1;}
    .vp-btn:active{background:rgba(201,168,76,.15);}
    .vp-btn:disabled{opacity:.2;cursor:default;}
    .vp-num{font-size:.9rem;font-weight:700;color:#fff;min-width:18px;text-align:center;}
    .m-var-badge{font-size:.75rem;font-weight:700;color:var(--gold);min-width:20px;text-align:center;}
    .m-price-table{display:flex;gap:.3rem;flex-shrink:0;align-items:flex-end;}
    .m-price-col{display:flex;flex-direction:column;align-items:center;min-width:44px;}
    .m-price-col-lbl{font-size:.48rem;color:var(--gray);white-space:nowrap;text-align:center;line-height:1.2;letter-spacing:.03em;}
    .m-price-col-val{font-family:'Playfair Display',serif;font-size:.78rem;color:var(--gold);font-weight:700;white-space:nowrap;text-align:center;}
    .r-rm{background:transparent;border:none;color:rgba(255,80,80,.45);font-size:1.1rem;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;}
    .r-rm:active{color:rgba(255,80,80,.9);}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:130px;left:50%;transform:translateX(-50%);
      background:rgba(40,40,40,.96);color:#fff;padding:8px 18px;
      border-radius:20px;font-size:.8rem;letter-spacing:.04em;
      opacity:0;transition:opacity .3s;pointer-events:none;
      z-index:999;white-space:nowrap;border:1px solid var(--border);
    }
    .toast.show{opacity:1;}
  </style>
</head>
<body>
<div id="app">

  <!-- ── MESAS ── -->
  <div class="screen" id="screen-mesas">
    <div class="hdr">
      <div class="hdr-brand">Lescano's</div>
      <div class="hdr-sub">— Pedidos</div>
      <button onclick="window.location.href='./index.html'"
        style="background:transparent;border:1px solid rgba(201,168,76,.3);color:rgba(201,168,76,.7);
        font-size:.6rem;padding:.3rem .6rem;border-radius:4px;cursor:pointer;margin-left:auto;letter-spacing:.08em;">
        ← Panel
      </button>
    </div>
    <div class="mesa-heading">¿Para qué mesa?</div>
    <div class="mesa-grid" id="mesa-grid"></div>
  </div>

  <!-- ── MENU ── -->
  <div class="screen" id="screen-menu">
    <div class="hdr">
      <button class="back-btn" id="back-mesas">‹</button>
      <div class="hdr-mesa" id="hdr-mesa">Mesa 1</div>
      <div class="cart-pill" id="cart-pill">0</div>
    </div>
    <div class="page-tabs" id="page-tabs"></div>
    <div class="menu-scroll" id="menu-scroll"></div>
    <div class="menu-ftr">
      <button class="btn-ver" id="btn-ver" disabled>Ver resumen · 0 items</button>
    </div>
  </div>

  <!-- ── RESUMEN ── -->
  <div class="screen" id="screen-resumen">
    <div class="hdr">
      <button class="back-btn" id="back-menu">‹</button>
      <div class="hdr-mesa" id="hdr-resumen-mesa">Mesa 1</div>
    </div>
    <div class="resumen-scroll" id="resumen-scroll"></div>
    <div class="resumen-ftr">
      <button class="btn-enviar" id="btn-enviar">📲 Enviar a cocina</button>
      <div class="fallback" id="fallback">
        <textarea id="fallback-txt" readonly></textarea>
        <button class="btn-copiar" id="btn-copiar">Copiar texto</button>
      </div>
      <button class="btn-cerrar" id="btn-cerrar">Cerrar mesa</button>
    </div>
  </div>

</div>

<!-- ── VARIANT PICKER ── -->
<div class="vp-overlay" id="vp-overlay">
  <div class="vp-sheet">
    <div class="vp-handle"></div>
    <div class="vp-item-name" id="vp-name"></div>
    <div class="vp-title">¿CÓMO LO QUIERE?</div>
    <div class="vp-options" id="vp-options"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────
const WA_NUMBER  = '__WA_NUMBER__';
const NUM_MESAS  = +'__NUM_MESAS__';
const SB_URL     = 'https://hfayvobhkkkdrijzsmtk.supabase.co';
const SB_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmYXl2b2Joa2trZHJpanpzbXRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njg2NTgsImV4cCI6MjA5NjQ0NDY1OH0.baQL05XahRraU88bmTuni1Uh0rBN9IqbET98DM_g4Os';

// ── SUPABASE CLIENT ─────────────────────────────────
const sb = supabase.createClient(SB_URL, SB_KEY);

// ── MENU DATA ────────────────────────────────────────
function getMenu() {
  try {
    const s = localStorage.getItem('lescanos_carta');
    return s ? JSON.parse(s) : DEFAULT_CARTA;
  } catch(e) { return DEFAULT_CARTA; }
}

// ── STATE ─────────────────────────────────────────────
let mesa           = null;
let cart           = [];
let pageIdx        = 0;
let itemsMap       = {};
let currentSession = null;   // sesión activa en Supabase
let sessionItems   = [];     // items ya enviados en esta sesión
let openSessions   = {};     // { 'mesa_1': session, ... }

// ── LOCALSTORAGE (fallback sin conexión) ──────────────
const lsKey = () => mesa === 'llevar' ? 'lescanos_order_llevar' : `lescanos_order_${mesa}`;
function cartLoad()  { try { cart = JSON.parse(localStorage.getItem(lsKey())) || []; } catch(e) { cart = []; } }
function cartSave()  { cart.length ? localStorage.setItem(lsKey(), JSON.stringify(cart)) : localStorage.removeItem(lsKey()); }
function cartClear() { localStorage.removeItem(lsKey()); cart = []; }

// ── CART OPS ──────────────────────────────────────────
function addItem(id) {
  const item = itemsMap[id]; if (!item) return;
  const e = cart.find(c => c.id === id);
  const precio = item.precio || (item.precios && item.precios[0]) || '$0';
  e ? e.qty++ : cart.push({id, nombre:item.nombre, precio, qty:1, pagina:item.pagina, seccion:item.seccion});
  cartSave(); updateCartUI();
}
function removeItem(id) {
  const i = cart.findIndex(c => c.id === id); if (i === -1) return;
  cart[i].qty > 1 ? cart[i].qty-- : cart.splice(i, 1);
  cartSave(); updateCartUI();
}
function cartCount()    { return cart.reduce((s,c) => s + c.qty, 0); }
function cartTotal()    { return cart.reduce((s,c) => s + parsePrecio(c.precio) * c.qty, 0); }
function sessionTotal() { return sessionItems.reduce((s,c) => s + parsePrecio(c.precio) * c.qty, 0); }
function grandTotal()   { return cartTotal() + sessionTotal(); }
function parsePrecio(p) { return parseInt((p||'').replace(/\D/g,'')) || 0; }
function hasRealPrices() {
  return cart.some(c => parsePrecio(c.precio) > 0) || sessionItems.some(c => parsePrecio(c.precio) > 0);
}

// ── SUPABASE OPS ──────────────────────────────────────
async function loadOpenSessions() {
  try {
    const { data } = await sb.from('sesiones').select('mesa,id,created_at').eq('estado','abierta');
    openSessions = {};
    (data || []).forEach(s => { openSessions[s.mesa] = s; });
  } catch(e) { openSessions = {}; }
}

async function openOrLoadSession(mesaId) {
  try {
    const { data } = await sb.from('sesiones')
      .select('*').eq('mesa', mesaId).eq('estado','abierta')
      .order('created_at', { ascending: false }).limit(1);

    if (data && data.length > 0) {
      currentSession = data[0];
      await loadSessionItems();
    } else {
      const { data: created, error } = await sb.from('sesiones')
        .insert({ mesa: mesaId, estado: 'abierta' }).select().single();
      if (error) throw error;
      currentSession = created;
      sessionItems = [];
    }
  } catch(e) {
    console.error('Supabase:', e);
    currentSession = null;
    sessionItems = [];
    toast('Sin conexión — modo local');
  }
}

async function loadSessionItems() {
  if (!currentSession) return;
  try {
    const { data } = await sb.from('pedido_items')
      .select('*').eq('sesion_id', currentSession.id)
      .order('created_at', { ascending: true });
    sessionItems = data || [];
  } catch(e) { sessionItems = []; }
}

async function saveOrderToSupabase() {
  if (!currentSession || cart.length === 0) return false;
  try {
    const { data: pedido, error: pErr } = await sb.from('pedidos')
      .insert({ sesion_id: currentSession.id }).select().single();
    if (pErr) throw pErr;

    const items = cart.map(c => ({
      pedido_id: pedido.id,
      sesion_id: currentSession.id,
      nombre:    c.nombre,
      precio:    c.precio,
      qty:       c.qty,
      pagina:    c.pagina  || '',
      seccion:   c.seccion || ''
    }));

    const { error: iErr } = await sb.from('pedido_items').insert(items);
    if (iErr) throw iErr;

    await loadSessionItems();
    return true;
  } catch(e) {
    console.error('Error guardando pedido:', e);
    return false;
  }
}

async function closeSession() {
  if (!currentSession) {
    currentSession = null; sessionItems = []; cart = []; cartClear();
    await loadOpenSessions(); renderMesas(); showScreen('mesas'); return;
  }
  try {
    await sb.from('sesiones')
      .update({ estado: 'cerrada', closed_at: new Date().toISOString() })
      .eq('id', currentSession.id);
  } catch(e) { console.error('Error cerrando sesión:', e); }
  currentSession = null; sessionItems = []; cart = []; cartClear();
  await loadOpenSessions();
  renderMesas();
  showScreen('mesas');
}

// ── UI HELPERS ────────────────────────────────────────
function mesaLabel() { return mesa === 'llevar' ? 'Para llevar' : `Mesa ${mesa.replace('mesa_','')}`; }

function updateCartUI() {
  const n = cartCount();
  document.getElementById('cart-pill').textContent = n;
  const btn = document.getElementById('btn-ver');
  const hasSession = sessionItems.length > 0;
  btn.disabled = n === 0 && !hasSession;
  if (n > 0) {
    btn.textContent = `Ver resumen · ${n} item${n !== 1 ? 's' : ''}`;
  } else if (hasSession) {
    btn.textContent = 'Ver cuenta de la mesa';
  } else {
    btn.textContent = 'Ver resumen · 0 items';
  }
}

function toast(msg, ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
}

// ── SCREEN: MESAS ─────────────────────────────────────
async function renderMesas() {
  await loadOpenSessions();
  let h = '';
  for (let i = 1; i <= NUM_MESAS; i++) {
    const key = `mesa_${i}`;
    const active = !!openSessions[key];
    h += `<div class="mesa-btn${active?' has-session':''}" data-mesa="${key}">
      <div class="mesa-num">${i}</div>
      <div class="mesa-lbl">Mesa</div>
      ${active ? `<div class="mesa-session-dot"></div>` : ''}
    </div>`;
  }
  const llevarActive = !!openSessions['llevar'];
  h += `<div class="mesa-btn llevar${llevarActive?' has-session':''}" data-mesa="llevar">
    <span style="font-size:1.2rem">🛍️</span>
    <div class="llevar-lbl">Para llevar</div>
    ${llevarActive ? `<div class="mesa-session-dot"></div>` : ''}
  </div>`;
  document.getElementById('mesa-grid').innerHTML = h;
}

document.getElementById('mesa-grid').addEventListener('click', async e => {
  const btn = e.target.closest('[data-mesa]');
  if (!btn) return;
  mesa = btn.dataset.mesa;
  cartLoad();
  pageIdx = 0;
  document.getElementById('hdr-mesa').textContent = mesaLabel();
  document.getElementById('hdr-resumen-mesa').textContent = mesaLabel();

  // Mostrar menú de inmediato y cargar sesión en background
  showScreen('menu');
  renderMenu();

  await openOrLoadSession(mesa);
  updateCartUI();
});

// ── SCREEN: MENU ──────────────────────────────────────
function renderMenu() { renderPageTabs(); renderMenuContent(); updateCartUI(); }

function renderPageTabs() {
  const m = getMenu();
  document.getElementById('page-tabs').innerHTML = m
    .map((p,i) => `<div class="p-tab${i === pageIdx ? ' active' : ''}" data-pg="${i}">${p.titulo}</div>`)
    .join('');
}

document.getElementById('page-tabs').addEventListener('click', e => {
  const t = e.target.closest('[data-pg]');
  if (!t) return;
  pageIdx = +t.dataset.pg;
  renderPageTabs();
  renderMenuContent();
  document.getElementById('menu-scroll').scrollTop = 0;
});

function renderMenuContent() {
  const m = getMenu();
  const page = m[pageIdx];
  itemsMap = {};
  let h = '';

  if (page.tipo === 'promos') {
    h += `<div class="sec-hdr">
      <span>🎉</span>
      <span class="sec-title">${page.subtitulo || 'PROMOS'}</span>
    </div>`;
    (page.items || []).forEach((item, ii) => {
      const id = `promo-${pageIdx}-${ii}`;
      itemsMap[id] = {...item, pagina: page.titulo, seccion: ''};
      const inCart = cart.find(c => c.id === id);
      const qty = inCart ? inCart.qty : 0;
      const showP = item.precio && item.precio !== '$0';
      h += `<div class="m-item">
        <div class="m-info"><div class="m-nombre">${esc(item.nombre)}</div></div>
        ${showP ? `<div class="m-precio">${esc(item.precio)}</div>` : ''}
        <div class="qty-wrap">
          ${qty > 0 ? `<button class="q-btn" data-rm="${id}">−</button><span class="q-num">${qty}</span>` : ''}
          <button class="q-btn" data-add="${id}">+</button>
        </div>
      </div>`;
    });
  } else {
    page.secciones.forEach((sec, si) => {
      h += `<div class="sec-hdr">
        <span>${sec.emoji}</span>
        <span class="sec-title">${sec.titulo}</span>
        ${sec.nota ? `<span class="sec-nota">${sec.nota}</span>` : ''}
      </div>`;
      sec.items.forEach((item, ii) => {
        const baseId = `p${pageIdx}s${si}i${ii}`;
        if (sec.columnas) {
          itemsMap[baseId] = {...item, pagina: page.titulo, seccion: sec.titulo, _columnas: sec.columnas};
          const totalQty = cart.filter(c => c.id.startsWith(baseId + '-c')).reduce((s,c) => s + c.qty, 0);
          const priceTableHTML = `<div class="m-price-table">${sec.columnas.map((col, ci) => {
            const p = (item.precios && item.precios[ci]) || '$0';
            return `<div class="m-price-col">
              <div class="m-price-col-lbl">${esc(col)}</div>
              <div class="m-price-col-val">${esc(p)}</div>
            </div>`;
          }).join('')}</div>`;
          h += `<div class="m-item">
            <div class="m-info">
              <div class="m-nombre">${esc(item.nombre)}</div>
              ${item.desc ? `<div class="m-desc">${esc(item.desc)}</div>` : ''}
            </div>
            ${priceTableHTML}
            <div class="qty-wrap">
              ${totalQty > 0 ? `<span class="m-var-badge">${totalQty}×</span>` : ''}
              <button class="q-btn" data-vp="${baseId}">+</button>
            </div>
          </div>`;
        } else {
          itemsMap[baseId] = {...item, pagina: page.titulo, seccion: sec.titulo};
          const inCart = cart.find(c => c.id === baseId);
          const qty = inCart ? inCart.qty : 0;
          const _p = item.precio || (item.precios && item.precios[0]) || '$0';
          const showP = _p && _p !== '$0';
          h += `<div class="m-item">
            <div class="m-info">
              <div class="m-nombre">${esc(item.nombre)}</div>
              ${item.desc ? `<div class="m-desc">${esc(item.desc)}</div>` : ''}
            </div>
            ${showP ? `<div class="m-precio">${esc(_p)}</div>` : ''}
            <div class="qty-wrap">
              ${qty > 0 ? `<button class="q-btn" data-rm="${baseId}">−</button><span class="q-num">${qty}</span>` : ''}
              <button class="q-btn" data-add="${baseId}">+</button>
            </div>
          </div>`;
        }
      });
    });
  }
  document.getElementById('menu-scroll').innerHTML = h;
}

document.getElementById('menu-scroll').addEventListener('click', e => {
  const add = e.target.closest('[data-add]');
  const rm  = e.target.closest('[data-rm]');
  const vp  = e.target.closest('[data-vp]');
  if (vp)  { showVariantPicker(vp.dataset.vp); return; }
  if (add) { addItem(add.dataset.add); renderMenuContent(); }
  if (rm)  { removeItem(rm.dataset.rm); renderMenuContent(); }
});

// ── VARIANT PICKER ────────────────────────────────────
let vpBaseId = null;

function showVariantPicker(baseId) {
  const item = itemsMap[baseId];
  if (!item || !item._columnas) return;
  vpBaseId = baseId;
  document.getElementById('vp-name').textContent = item.nombre;
  refreshVariantPicker();
  document.getElementById('vp-overlay').classList.add('show');
}

function refreshVariantPicker() {
  const item = itemsMap[vpBaseId]; if (!item) return;
  const cols = item._columnas;
  const precios = item.precios || [];
  document.getElementById('vp-options').innerHTML = cols.map((col, ci) => {
    const p = precios[ci] || '$0';
    const showP = p && p !== '$0';
    const varId = `${vpBaseId}-c${ci}`;
    const qty = (cart.find(c => c.id === varId) || {qty: 0}).qty;
    return `<div class="vp-option">
      <div class="vp-col-name">${esc(col)}</div>
      ${showP ? `<div class="vp-col-price">${esc(p)}</div>` : '<div class="vp-col-price"></div>'}
      <div class="vp-qty-wrap">
        <button class="vp-btn" data-vrm="${ci}" ${qty === 0 ? 'disabled' : ''}>−</button>
        <span class="vp-num">${qty}</span>
        <button class="vp-btn" data-vadd="${ci}">+</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('vp-options').addEventListener('click', e => {
  const addBtn = e.target.closest('[data-vadd]');
  const rmBtn  = e.target.closest('[data-vrm]');
  if (addBtn) { addVariant(vpBaseId, +addBtn.dataset.vadd); refreshVariantPicker(); updateCartUI(); }
  if (rmBtn && !rmBtn.disabled) { removeVariant(vpBaseId, +rmBtn.dataset.vrm); refreshVariantPicker(); updateCartUI(); }
});

document.getElementById('vp-overlay').addEventListener('click', e => {
  if (!e.target.closest('.vp-sheet')) {
    document.getElementById('vp-overlay').classList.remove('show');
    renderMenuContent();
  }
});

function addVariant(baseId, colIdx) {
  const item = itemsMap[baseId]; if (!item) return;
  const id = `${baseId}-c${colIdx}`;
  const col = item._columnas[colIdx];
  const precio = (item.precios && item.precios[colIdx]) || '$0';
  const nombre = `${item.nombre} (${col})`;
  const e = cart.find(c => c.id === id);
  e ? e.qty++ : cart.push({id, nombre, precio, qty: 1, pagina: item.pagina, seccion: item.seccion});
  cartSave();
}
function removeVariant(baseId, colIdx) {
  const id = `${baseId}-c${colIdx}`;
  const i = cart.findIndex(c => c.id === id); if (i === -1) return;
  cart[i].qty > 1 ? cart[i].qty-- : cart.splice(i, 1);
  cartSave();
}

// ── SCREEN: RESUMEN ───────────────────────────────────
function renderResumen() {
  document.getElementById('hdr-resumen-mesa').textContent = mesaLabel();
  document.getElementById('fallback').style.display = 'none';
  let h = '';

  if (cart.length === 0 && sessionItems.length === 0) {
    h = `<div class="r-empty">No hay items en esta cuenta.<br>Agregá productos desde el menú.</div>`;
  } else {
    // Pendiente de envío
    if (cart.length > 0) {
      if (sessionItems.length > 0) {
        h += `<div class="r-section-label">Pendiente de envío</div>`;
      }
      cart.forEach((item, idx) => {
        const showP = item.precio && item.precio !== '$0';
        h += `<div class="r-item">
          <div class="r-qty">×${item.qty}</div>
          <div class="r-nombre">${esc(item.nombre)}</div>
          ${showP ? `<div class="r-precio">${esc(item.precio)}</div>` : ''}
          <button class="r-rm" data-ridx="${idx}">✕</button>
        </div>`;
      });
    }

    // Ya enviado en esta sesión
    if (sessionItems.length > 0) {
      if (cart.length > 0) {
        h += `<div class="r-section-label">Ya enviado</div>`;
      }
      sessionItems.forEach(item => {
        const showP = item.precio && item.precio !== '$0';
        h += `<div class="r-item r-sent">
          <div class="r-qty">×${item.qty}</div>
          <div class="r-nombre">${esc(item.nombre)}</div>
          ${showP ? `<div class="r-precio">${esc(item.precio)}</div>` : ''}
        </div>`;
      });
    }

    // Total de la cuenta
    if (hasRealPrices()) {
      const total = grandTotal();
      const lbl = sessionItems.length > 0 ? 'Total de la cuenta' : 'Total estimado';
      h += `<div class="r-total">
        <span class="r-total-lbl">${lbl}</span>
        <span class="r-total-val">$${total.toLocaleString('es-AR')}</span>
      </div>`;
    }
  }

  document.getElementById('resumen-scroll').innerHTML = h;

  // Botón enviar: habilitado solo si hay items en el cart
  const envBtn = document.getElementById('btn-enviar');
  envBtn.disabled = cart.length === 0;
  envBtn.textContent = cart.length > 0
    ? `📲 Enviar a cocina (${cartCount()} items)`
    : '📲 Sin items pendientes';
}

document.getElementById('resumen-scroll').addEventListener('click', e => {
  const rm = e.target.closest('[data-ridx]');
  if (!rm) return;
  const idx = +rm.dataset.ridx;
  if (cart[idx]) {
    cart[idx].qty > 1 ? cart[idx].qty-- : cart.splice(idx, 1);
    cartSave(); updateCartUI(); renderResumen();
  }
});

// ── SEND ──────────────────────────────────────────────
function buildMsg() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  let msg = `*${mesaLabel()} — ${hh}:${mm}*\n`;

  const byPage = {};
  const pageOrder = [];
  cart.forEach(item => {
    const pg  = item.pagina  || '';
    const sec = item.seccion || '';
    if (!byPage[pg]) { byPage[pg] = {}; pageOrder.push(pg); }
    if (!byPage[pg][sec]) byPage[pg][sec] = [];
    byPage[pg][sec].push(item);
  });

  pageOrder.forEach(pg => {
    const secs = byPage[pg];
    const secKeys = Object.keys(secs);
    if (pg) msg += `\n*${pg}*\n`;
    secKeys.forEach(sec => {
      if (sec && secKeys.length > 1) msg += `_${sec}_\n`;
      secs[sec].forEach(item => {
        const p = (item.precio && item.precio !== '$0') ? ` — ${item.precio}` : '';
        msg += `• ${item.qty}× ${item.nombre}${p}\n`;
      });
    });
  });

  if (cart.some(c => parsePrecio(c.precio) > 0)) {
    msg += `\n*Subtotal: $${cartTotal().toLocaleString('es-AR')}*`;
  }
  return msg.trim();
}

document.getElementById('btn-enviar').addEventListener('click', async () => {
  const envBtn = document.getElementById('btn-enviar');
  envBtn.disabled = true;
  envBtn.textContent = 'Guardando...';

  // Guardar en Supabase
  const saved = await saveOrderToSupabase();

  // Construir y enviar WhatsApp
  const msg = buildMsg();
  const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  const a = document.createElement('a');
  a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);

  // Mostrar fallback
  document.getElementById('fallback-txt').value = msg;
  document.getElementById('fallback').style.display = 'block';

  // Limpiar cart (sesión queda abierta)
  cartClear();

  toast(saved ? '¡Pedido enviado y guardado! ✓' : '¡Pedido enviado! (sin conexión)');

  // Re-render resumen con historial actualizado
  renderResumen();
  updateCartUI();
});

document.getElementById('btn-copiar').addEventListener('click', async () => {
  const txt = document.getElementById('fallback-txt').value;
  try {
    await navigator.clipboard.writeText(txt);
    toast('Copiado al portapapeles ✓');
  } catch(e) {
    const ta = document.getElementById('fallback-txt');
    ta.select(); ta.setSelectionRange(0, 99999);
    try { document.execCommand('copy'); toast('Texto copiado ✓'); }
    catch(e2) { toast('Seleccioná el texto y copialo manualmente'); }
  }
});

document.getElementById('btn-cerrar').addEventListener('click', async () => {
  const hasItems = cart.length > 0 || sessionItems.length > 0;
  const msg = hasItems
    ? '¿Cerrar la cuenta de esta mesa? Los pedidos quedarán guardados en el historial.'
    : '¿Cerrar la sesión de esta mesa?';
  if (!confirm(msg)) return;
  await closeSession();
  toast('Mesa cerrada ✓');
});

// ── NAV BUTTONS ───────────────────────────────────────
document.getElementById('back-mesas').addEventListener('click', async () => {
  // No cerramos la sesión — la mesa queda abierta
  mesa = null; cart = []; currentSession = null; sessionItems = [];
  await renderMesas();
  showScreen('mesas');
});
document.getElementById('back-menu').addEventListener('click', () => {
  renderMenu(); showScreen('menu');
});
document.getElementById('btn-ver').addEventListener('click', () => {
  renderResumen(); showScreen('resumen');
});

// ── UTILS ─────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──────────────────────────────────────────────
renderMesas();
showScreen('mesas');
</script>
