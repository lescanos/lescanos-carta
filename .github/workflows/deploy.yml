name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare dist
        run: |
          mkdir -p dist
          rsync -a --exclude='.git' --exclude='.github' --exclude='dist' . dist/

      - name: Inject secrets
        env:
          ADMIN_PWD: ${{ secrets.ADMIN_PWD }}
          WA_NUMBER: ${{ secrets.WA_NUMBER }}
          NUM_MESAS: ${{ secrets.NUM_MESAS }}
        run: |
          python3 - <<'EOF'
          import os

          replacements = {
            'dist/index.html': [
              ('__ADMIN_PWD__', os.environ['ADMIN_PWD']),
            ],
            'dist/litzy.html': [
              ('__WA_NUMBER__', os.environ['WA_NUMBER']),
              ('__NUM_MESAS__', os.environ['NUM_MESAS']),
            ],
          }

          for path, pairs in replacements.items():
            with open(path, encoding='utf-8') as f:
              content = f.read()
            for placeholder, value in pairs:
              content = content.replace(placeholder, value)
            with open(path, 'w', encoding='utf-8') as f:
              f.write(content)

          print('Secrets injected OK')
          EOF

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
