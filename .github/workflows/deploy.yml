name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare dist
        run: |
          mkdir -p dist
          rsync -a --exclude='.git' --exclude='.github' --exclude='dist' . dist/
          touch dist/.nojekyll

      - name: Inject secrets
        env:
          ADMIN_PWD: ${{ secrets.ADMIN_PWD }}
          WA_NUMBER: ${{ secrets.WA_NUMBER }}
          NUM_MESAS: ${{ secrets.NUM_MESAS }}
          MENU_TOKEN: ${{ secrets.MENU_TOKEN }}
        run: python3 .github/inject.py

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
