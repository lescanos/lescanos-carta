<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Lescano's — Carta Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--dark:#111111;--dark2:#1C1C1C;
  --cream:#F5F0E8;--cream2:#EDE8DC;--gray:#888888;--text:#1A1A1A;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);
  font-family:'Lato',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}

/* ── CARTA VIEW ── */
#carta-view{position:fixed;inset:0;z-index:1;}
.carousel{display:flex;width:100%;height:100vh;overflow-x:scroll;scroll-snap-type:x mandatory;scrollbar-width:none;}
.carousel::-webkit-scrollbar{display:none;}
/* width:100vw (no min-width) impide que el contenido crezca el slide más allá del viewport */
.slide{width:100vw;height:100vh;display:flex;overflow:hidden;scroll-snap-align:start;flex-shrink:0;}
.left{width:36%;min-width:36%;height:100%;background:var(--dark);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:1.2rem .8rem;position:relative;flex-shrink:0;}
.left::after{content:'';position:absolute;right:0;top:0;width:3px;height:100%;background:var(--gold);}
.brand-name{font-family:'Playfair Display',serif;font-size:clamp(1rem,3.8vw,1.7rem);font-weight:900;
  color:var(--gold);letter-spacing:.05em;text-align:center;line-height:1;}
.brand-sub{font-size:clamp(.5rem,1.7vw,.62rem);color:var(--gray);letter-spacing:.3em;margin-top:.3rem;text-align:center;}
.gold-line{width:70%;height:1px;background:var(--gold);margin:.55rem auto;opacity:.8;}
.logo-img{width:clamp(70px,21vw,150px);height:auto;display:block;margin:0 auto;}
.contact-title{font-size:clamp(.52rem,1.4vw,.58rem);color:var(--gold);letter-spacing:.25em;font-weight:700;margin-top:.6rem;text-align:center;}
.contact-list{list-style:none;margin-top:.35rem;width:100%;}
.contact-list li{font-size:clamp(.55rem,1.5vw,.6rem);color:#BBBBBB;text-align:center;padding:.16rem 0;line-height:1.3;}
.right{flex:1;min-width:0;height:100%;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;}
.right-header{display:flex;justify-content:space-between;align-items:center;padding:.5rem .9rem .35rem;
  border-bottom:1px solid rgba(201,168,76,.25);}
.carta-label{font-size:clamp(.55rem,1.5vw,.6rem);color:var(--gold);letter-spacing:.18em;font-style:italic;}
.page-counter{font-size:clamp(.52rem,1.4vw,.58rem);color:var(--gray);font-style:italic;white-space:nowrap;}
.menu-body{flex:1;min-width:0;overflow-y:auto;padding:0 .9rem .7rem;-webkit-overflow-scrolling:touch;}
.menu-body::-webkit-scrollbar{display:none;}
.section{margin-top:.65rem;}
.section-header{background:var(--dark);padding:.32rem .6rem;border-radius:3px;margin-bottom:.4rem;display:flex;align-items:center;gap:.35rem;overflow:hidden;}
.section-header span{font-weight:700;font-size:clamp(.62rem,1.9vw,.78rem);color:var(--gold);letter-spacing:.07em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item{display:flex;justify-content:space-between;align-items:flex-start;padding:.32rem .08rem;
  border-bottom:.5px solid rgba(0,0,0,.08);gap:.45rem;}
.item:last-child{border-bottom:none;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:clamp(.72rem,2vw,.82rem);font-weight:700;color:var(--text);line-height:1.2;}
.item-desc{font-size:clamp(.60rem,1.5vw,.62rem);color:var(--gray);font-style:italic;margin-top:.08rem;line-height:1.3;}
.item-price{font-family:'Playfair Display',serif;font-size:clamp(.75rem,2.1vw,.86rem);font-weight:700;
  color:var(--gold);white-space:nowrap;flex-shrink:0;padding-top:.04rem;}
.right-footer{padding:.35rem .9rem;border-top:1px solid rgba(201,168,76,.3);text-align:center;}
.right-footer p{font-size:clamp(.5rem,1.2vw,.52rem);color:var(--gray);font-style:italic;}
/* ── MOBILE: panel izquierdo más angosto para dar más espacio al menú ── */
@media(max-width:480px){
  .left{width:28%;min-width:28%;padding:.8rem .5rem;}
  .logo-img{width:clamp(50px,18vw,90px);}
  .menu-body{padding:0 .7rem .5rem;}
}
.nav-dots{position:fixed;bottom:.9rem;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(201,168,76,.35);transition:all .3s ease;cursor:pointer;}
.dot.active{background:var(--gold);width:18px;border-radius:3px;}
.swipe-hint{position:fixed;bottom:2.4rem;left:50%;transform:translateX(-50%);font-size:.55rem;
  color:rgba(201,168,76,.5);letter-spacing:.1em;z-index:10;pointer-events:none;animation:fadeHint 3.5s ease forwards;}
@keyframes fadeHint{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
.admin-btn{position:fixed;bottom:.7rem;right:.8rem;background:rgba(17,17,17,.7);border:1px solid rgba(201,168,76,.3);
  color:rgba(201,168,76,.5);font-size:.55rem;padding:.3rem .55rem;border-radius:4px;cursor:pointer;z-index:20;
  letter-spacing:.1em;transition:all .2s;}
.admin-btn:hover{color:var(--gold);border-color:var(--gold);}

/* ── LOGIN VIEW ── */
#login-view{position:fixed;inset:0;z-index:100;background:var(--dark);display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;}
#login-view.active{display:flex;}
.login-logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--gold);}
.login-sub{font-size:.65rem;color:var(--gray);letter-spacing:.2em;}
.login-box{background:#1C1C1C;border:1px solid rgba(201,168,76,.25);border-radius:10px;
  padding:1.5rem;width:min(320px,90vw);display:flex;flex-direction:column;gap:.9rem;}
.login-box label{font-size:.7rem;color:var(--gray);letter-spacing:.1em;}
.login-box input{background:#111;border:1px solid rgba(201,168,76,.3);color:#fff;
  padding:.6rem .8rem;border-radius:6px;font-size:.9rem;width:100%;outline:none;font-family:'Lato',sans-serif;}
.login-box input:focus{border-color:var(--gold);}
.login-btn{background:var(--gold);color:#111;font-weight:700;font-size:.85rem;
  padding:.65rem;border-radius:6px;border:none;cursor:pointer;letter-spacing:.08em;width:100%;}
.login-btn:hover{background:#E8D5A0;}
.login-error{font-size:.7rem;color:#e05;text-align:center;display:none;}
.login-error.show{display:block;}
.back-btn-login{font-size:.65rem;color:var(--gray);cursor:pointer;text-decoration:underline;text-align:center;}

/* ── ADMIN VIEW ── */
#admin-view{position:fixed;inset:0;z-index:100;background:#0E0E0E;display:none;flex-direction:column;overflow:hidden;}
#admin-view.active{display:flex;}
.admin-topbar{background:#1A1A1A;border-bottom:1px solid rgba(201,168,76,.2);padding:.7rem 1rem;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.admin-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);}
.admin-title span{font-size:.62rem;color:var(--gray);font-family:'Lato',sans-serif;margin-left:.4rem;}
.topbar-actions{display:flex;gap:.5rem;}
.btn-save{background:var(--gold);color:#111;font-weight:700;font-size:.72rem;padding:.38rem .8rem;
  border-radius:5px;border:none;cursor:pointer;letter-spacing:.05em;}
.btn-save:hover{background:#E8D5A0;}
.btn-exit{background:transparent;color:var(--gray);font-size:.72rem;padding:.38rem .7rem;
  border-radius:5px;border:1px solid rgba(255,255,255,.1);cursor:pointer;}
.btn-exit:hover{color:#fff;border-color:rgba(255,255,255,.3);}
.admin-body{flex:1;overflow-y:auto;padding:.8rem 1rem 4rem;-webkit-overflow-scrolling:touch;}
.admin-body::-webkit-scrollbar{width:4px;}
.admin-body::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px;}
.admin-section{background:#1A1A1A;border:1px solid rgba(201,168,76,.15);border-radius:10px;
  margin-bottom:1rem;overflow:hidden;}
.admin-section-header{background:#222;padding:.6rem .9rem;display:flex;align-items:center;justify-content:space-between;}
.admin-section-title{font-size:.78rem;font-weight:700;color:var(--gold);letter-spacing:.07em;}
.btn-add-item{background:transparent;color:rgba(201,168,76,.6);font-size:.65rem;border:1px solid rgba(201,168,76,.3);
  padding:.22rem .55rem;border-radius:4px;cursor:pointer;}
.btn-add-item:hover{color:var(--gold);border-color:var(--gold);}
.admin-items{padding:.5rem .7rem;}
.admin-item{background:#111;border:1px solid rgba(255,255,255,.06);border-radius:7px;
  padding:.55rem .7rem;margin-bottom:.45rem;display:grid;gap:.35rem;}
.admin-item-row{display:flex;gap:.5rem;align-items:center;}
.admin-item-row label{font-size:.6rem;color:var(--gray);width:52px;flex-shrink:0;}
.admin-item-row input{flex:1;background:#0E0E0E;border:1px solid rgba(255,255,255,.1);color:#fff;
  padding:.35rem .5rem;border-radius:5px;font-size:.78rem;font-family:'Lato',sans-serif;outline:none;}
.admin-item-row input:focus{border-color:var(--gold);}
.input-price{width:90px!important;flex:none!important;color:var(--gold)!important;font-weight:700;}
.btn-del-item{background:transparent;border:none;color:rgba(255,80,80,.4);cursor:pointer;font-size:1rem;
  padding:0 .2rem;flex-shrink:0;line-height:1;}
.btn-del-item:hover{color:rgba(255,80,80,.9);}
.admin-footer-bar{position:fixed;bottom:0;left:0;right:0;background:#1A1A1A;border-top:1px solid rgba(201,168,76,.2);
  padding:.6rem 1rem;display:flex;justify-content:center;z-index:110;}
.admin-footer-bar .btn-save{width:100%;max-width:320px;font-size:.82rem;padding:.5rem;}
.save-toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:var(--gold);color:#111;
  font-weight:700;font-size:.75rem;padding:.45rem 1.1rem;border-radius:20px;z-index:200;
  opacity:0;transition:opacity .3s;pointer-events:none;letter-spacing:.05em;}
.save-toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ═══════ CARTA VIEW ═══════ -->
<div id="carta-view">
  <div class="carousel" id="carousel"></div>
  <div class="nav-dots" id="dots"></div>
  <div class="swipe-hint">← deslizá para ver más →</div>
  <button class="admin-btn" onclick="showLogin()">⚙ admin</button>
</div>

<!-- ═══════ LOGIN VIEW ═══════ -->
<div id="login-view">
  <div class="login-logo">LESCANO'S</div>
  <div class="login-sub">PANEL ADMINISTRADOR</div>
  <div class="login-box">
    <label>CONTRASEÑA</label>
    <input type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkLogin()">
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
    <button class="login-btn" onclick="checkLogin()">INGRESAR</button>
  </div>
  <span class="back-btn-login" onclick="showCarta()">← volver a la carta</span>
</div>

<!-- ═══════ ADMIN VIEW ═══════ -->
<div id="admin-view">
  <div class="admin-topbar">
    <div class="admin-title">Panel Admin <span>Lescano's</span></div>
    <div class="topbar-actions">
      <button class="btn-save" onclick="saveAndApply()">💾 Guardar</button>
      <button class="btn-exit" onclick="showCarta()">✕ Salir</button>
    </div>
  </div>
  <div class="admin-body" id="admin-body"></div>
  <div class="admin-footer-bar">
    <button class="btn-save" onclick="saveAndApply()">💾 Guardar cambios</button>
  </div>
</div>

<div class="save-toast" id="save-toast">✓ Cambios guardados</div>

<script src="menu.js"></script>

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
function loadCarta(){
  try{
    const s=localStorage.getItem('lescanos_carta');
    return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_CARTA));
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_CARTA));}
}
function saveCarta(data){
  localStorage.setItem('lescanos_carta',JSON.stringify(data));
}
let CARTA=loadCarta();

// ═══════════════════════════════════════════════════
//  CARTA RENDER
// ═══════════════════════════════════════════════════
function renderCarta(){
  const carousel=document.getElementById('carousel');
  const dotsEl=document.getElementById('dots');
  carousel.innerHTML='';dotsEl.innerHTML='';
  const total=CARTA.length;
  CARTA.forEach((page,pi)=>{
    const slide=document.createElement('div');
    slide.className='slide';
    const secHTML=page.secciones.map(sec=>`
      <div class="section">
        <div class="section-header"><span>${sec.emoji} ${sec.titulo}${sec.nota?` <em style="font-weight:300;font-size:.85em;color:#aaa">— ${sec.nota}</em>`:''}</span></div>
        ${sec.items.map(item=>`
          <div class="item">
            <div class="item-info">
              <div class="item-name">${item.nombre}</div>
              ${item.desc?`<div class="item-desc">${item.desc}</div>`:''}
            </div>
            <div class="item-price">${item.precio}</div>
          </div>`).join('')}
      </div>`).join('');
    slide.innerHTML=`
      <div class="left">
        <div class="brand-name">LESCANO'S</div>
        <div class="brand-sub">FAST FOOD</div>
        <div class="gold-line"></div>
        <img class="logo-img" src="${LOGO_SRC}" alt="Logo">
        <div class="gold-line"></div>
        <div class="contact-title">CONTACTO</div>
        <ul class="contact-list">
          <li>📍 Oroño 5729, Rosario</li>
          <li>📱 341 549-4790</li>
          <li>📸 @lescanos_oficial</li>
          <li>👥 Lescanos Oficial</li>
        </ul>
      </div>
      <div class="right">
        <div class="right-header">
          <span class="carta-label">— CARTA DIGITAL —</span>
          <span class="page-counter">${pi+1} / ${total} · ${page.titulo}</span>
        </div>
        <div class="menu-body">${secHTML}</div>
        <div class="right-footer"><p>★ Los precios con $ 0 serán actualizados pronto ★</p></div>
      </div>`;
    carousel.appendChild(slide);
    const dot=document.createElement('div');
    dot.className='dot'+(pi===0?' active':'');
    dot.onclick=()=>goTo(pi);
    dotsEl.appendChild(dot);
  });
  initSwipe();
  goTo(0);
}

// ═══════════════════════════════════════════════════
//  SWIPE
// ═══════════════════════════════════════════════════
let current=0;

function slideW(){return window.innerWidth;}

function goTo(index){
  const total=CARTA.length;
  current=Math.max(0,Math.min(total-1,index));
  const c=document.getElementById('carousel');
  c.scrollTo({left:current*slideW(),behavior:'smooth'});
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));
}

function initSwipe(){
  const c=document.getElementById('carousel');
  c.addEventListener('scroll',()=>{
    const idx=Math.round(c.scrollLeft/slideW());
    if(idx!==current){
      current=idx;
      document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));
    }
  },{passive:true});
  document.onkeydown=e=>{
    if(e.key==='ArrowRight')goTo(current+1);
    if(e.key==='ArrowLeft')goTo(current-1);
  };
}

// ═══════════════════════════════════════════════════
function showCarta(){
  document.getElementById('carta-view').style.display='block';
  document.getElementById('login-view').classList.remove('active');
  document.getElementById('admin-view').classList.remove('active');
  document.body.style.overflow='hidden';
}
function showLogin(){
  document.getElementById('login-view').classList.add('active');
  document.getElementById('carta-view').style.display='none';
  document.getElementById('pwd-input').value='';
  document.getElementById('login-error').classList.remove('show');
  setTimeout(()=>document.getElementById('pwd-input').focus(),100);
}
function checkLogin(){
  const v=document.getElementById('pwd-input').value;
  if(v===ADMIN_PASS){
    document.getElementById('login-view').classList.remove('active');
    showAdmin();
  }else{
    document.getElementById('login-error').classList.add('show');
    document.getElementById('pwd-input').value='';
  }
}
function showAdmin(){
  document.getElementById('admin-view').classList.add('active');
  document.getElementById('carta-view').style.display='none';
  renderAdmin();
}

// ═══════════════════════════════════════════════════
//  ADMIN RENDER
// ═══════════════════════════════════════════════════
function renderAdmin(){
  const body=document.getElementById('admin-body');
  body.innerHTML=CARTA.map((page,pi)=>`
    <div class="admin-section">
      <div class="admin-section-header">
        <span class="admin-section-title">📄 Página ${page.pagina} — ${page.titulo}</span>
      </div>
      ${page.secciones.map((sec,si)=>`
        <div style="padding:.4rem .7rem .2rem;border-top:1px solid rgba(255,255,255,.05)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;">
            <span style="font-size:.68rem;color:var(--gold);font-weight:700;">${sec.emoji} ${sec.titulo}</span>
            <button class="btn-add-item" onclick="addItem(${pi},${si})">+ agregar producto</button>
          </div>
          <div class="admin-items" id="items-${pi}-${si}">
            ${sec.items.map((item,ii)=>`
              <div class="admin-item" id="item-${pi}-${si}-${ii}">
                <div class="admin-item-row">
                  <label>Nombre</label>
                  <input type="text" value="${escHtml(item.nombre)}"
                    oninput="updateField(${pi},${si},${ii},'nombre',this.value)">
                  <button class="btn-del-item" onclick="delItem(${pi},${si},${ii})" title="Eliminar">✕</button>
                </div>
                <div class="admin-item-row">
                  <label>Descripción</label>
                  <input type="text" value="${escHtml(item.desc)}"
                    oninput="updateField(${pi},${si},${ii},'desc',this.value)">
                </div>
                <div class="admin-item-row">
                  <label>Precio</label>
                  <input type="text" class="input-price" value="${escHtml(item.precio)}"
                    placeholder="$0" oninput="updateField(${pi},${si},${ii},'precio',this.value)">
                </div>
              </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function updateField(pi,si,ii,field,val){
  CARTA[pi].secciones[si].items[ii][field]=val;
}
function addItem(pi,si){
  CARTA[pi].secciones[si].items.push({nombre:"Nuevo producto",desc:"Descripción",precio:"$0"});
  renderAdmin();
  // scroll to new item
  const container=document.getElementById(`items-${pi}-${si}`);
  if(container)setTimeout(()=>container.lastElementChild.scrollIntoView({behavior:'smooth'}),50);
}
function delItem(pi,si,ii){
  if(!confirm('¿Eliminar este producto?'))return;
  CARTA[pi].secciones[si].items.splice(ii,1);
  renderAdmin();
}
function saveAndApply(){
  saveCarta(CARTA);
  renderCarta();
  const t=document.getElementById('save-toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
renderCarta();
showCarta();
</script>
</body>
</html>
